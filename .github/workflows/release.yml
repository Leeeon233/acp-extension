name: Release

env:
  NPM_BASE_NAME: acp-extension-codex

on:
  push:
    tags:
      - "codex-v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name for release (optional - uses version from Cargo.toml if not specified)"
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  get-version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_name: ${{ steps.get_version.outputs.tag_name }}
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve version and tag
        id: get_version
        shell: bash
        run: |
          CARGO_VERSION=$(awk -F'"' '/^version[[:space:]]*=[[:space:]]*"/ {print $2; exit}' packages/codex-acp/Cargo.toml)
          INPUT_TAG="${{ github.event.inputs.tag_name }}"

          if [ -n "$INPUT_TAG" ]; then
            TAG_NAME="$INPUT_TAG"
          elif [ -n "${GITHUB_REF_NAME:-}" ]; then
            TAG_NAME="$GITHUB_REF_NAME"
          else
            TAG_NAME="codex-v$CARGO_VERSION"
          fi

          if [[ "$TAG_NAME" == codex-v* ]]; then
            VERSION="${TAG_NAME#codex-v}"
          elif [[ "$TAG_NAME" == v* ]]; then
            VERSION="${TAG_NAME#v}"
          else
            VERSION="$CARGO_VERSION"
          fi

          if [ -z "$VERSION" ]; then
            echo "::error::Failed to resolve version"
            exit 1
          fi

          if [ -n "$CARGO_VERSION" ] && [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($VERSION) does not match packages/codex-acp/Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

          if [[ "$TAG_NAME" != codex-v* ]]; then
            TAG_NAME="codex-v$VERSION"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

  build:
    name: Build - ${{ matrix.os }}
    needs: get-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            binary_extension: ""
          - os: macos-14
            target: x86_64-apple-darwin
            binary_extension: ""
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary_extension: ""
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            binary_extension: ""
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            binary_extension: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_extension: ".exe"
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            binary_extension: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - if: ${{ matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl'}}
        name: Use hermetic Cargo home (musl)
        shell: bash
        run: |
          set -euo pipefail
          cargo_home="${GITHUB_WORKSPACE}/.cargo-home"
          mkdir -p "${cargo_home}/bin"
          echo "CARGO_HOME=${cargo_home}" >> "$GITHUB_ENV"
          echo "${cargo_home}/bin" >> "$GITHUB_PATH"
          : > "${cargo_home}/config.toml"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ matrix.os }}-${{ matrix.target }}-cargo-registry-${{ hashFiles('packages/codex-acp/**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-${{ matrix.target }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ matrix.os }}-${{ matrix.target }}-cargo-git-${{ hashFiles('packages/codex-acp/**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-${{ matrix.target }}-cargo-git-

      - name: Install Linux build dependencies
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev

      - name: Install UBSan runtime (musl)
        if: ${{ matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl' }}
        shell: bash
        run: |
          set -euo pipefail
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y libubsan1
          fi

      - if: ${{ matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl'}}
        name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - if: ${{ matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl'}}
        name: Install musl build tools
        env:
          TARGET: ${{ matrix.target }}
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/install-musl-build-tools.sh"

      - if: ${{ matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl' }}
        name: Configure musl rusty_v8 artifact overrides
        env:
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail
          # denoland/rusty_v8 does not publish musl prebuilts; use the ones
          # hosted on the upstream openai/codex releases instead.
          version=$(python3 -c "
          import tomllib, pathlib
          lock = tomllib.loads(pathlib.Path('Cargo.lock').read_text())
          vs = [p['version'] for p in lock['package'] if p['name'] == 'v8']
          assert len(vs) == 1, f'expected 1 v8 version, got {vs}'
          print(vs[0])
          ")
          release_tag="rusty-v8-v${version}"
          base_url="https://github.com/openai/codex/releases/download/${release_tag}"
          archive="${base_url}/librusty_v8_release_${TARGET}.a.gz"
          binding_dir="${RUNNER_TEMP}/rusty_v8"
          binding_path="${binding_dir}/src_binding_release_${TARGET}.rs"
          mkdir -p "${binding_dir}"
          curl -fsSL "${base_url}/src_binding_release_${TARGET}.rs" -o "${binding_path}"
          echo "RUSTY_V8_ARCHIVE=${archive}" >> "$GITHUB_ENV"
          echo "RUSTY_V8_SRC_BINDING_PATH=${binding_path}" >> "$GITHUB_ENV"

      - if: ${{ matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl'}}
        name: Configure rustc UBSan wrapper (musl host)
        shell: bash
        run: |
          set -euo pipefail
          ubsan=""
          if command -v ldconfig >/dev/null 2>&1; then
            ubsan="$(ldconfig -p | grep -m1 'libubsan\.so\.1' | sed -E 's/.*=> (.*)$/\1/')"
          fi
          wrapper_root="${RUNNER_TEMP:-/tmp}"
          wrapper="${wrapper_root}/rustc-ubsan-wrapper"
          cat > "${wrapper}" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          if [[ -n "${ubsan}" ]]; then
            export LD_PRELOAD="${ubsan}\${LD_PRELOAD:+:\${LD_PRELOAD}}"
          fi
          exec "\$1" "\${@:2}"
          EOF
          chmod +x "${wrapper}"
          echo "RUSTC_WRAPPER=${wrapper}" >> "$GITHUB_ENV"
          echo "RUSTC_WORKSPACE_WRAPPER=" >> "$GITHUB_ENV"

      - if: ${{ matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl'}}
        name: Clear sanitizer flags (musl)
        shell: bash
        run: |
          set -euo pipefail
          # Clear global Rust flags so host/proc-macro builds don't pull in UBSan.
          echo "RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_ENCODED_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "RUSTDOCFLAGS=" >> "$GITHUB_ENV"
          # Override any runner-level Cargo config rustflags as well.
          echo "CARGO_BUILD_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=" >> "$GITHUB_ENV"

          sanitize_flags() {
            local input="$1"
            input="${input//-fsanitize=undefined/}"
            input="${input//-fno-sanitize-recover=undefined/}"
            input="${input//-fno-sanitize-trap=undefined/}"
            echo "$input"
          }

          cflags="$(sanitize_flags "${CFLAGS-}")"
          cxxflags="$(sanitize_flags "${CXXFLAGS-}")"
          echo "CFLAGS=${cflags}" >> "$GITHUB_ENV"
          echo "CXXFLAGS=${cxxflags}" >> "$GITHUB_ENV"

          # aws-lc-sys's jitterentropy C code picks up runner-injected
          # UBSan flags through cmake in ways that are hard to fully
          # suppress.  Disable jitterentropy entirely — the codex Bazel
          # build does the same (see MODULE.bazel).
          echo "AWS_LC_SYS_NO_JITTER_ENTROPY=1" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --manifest-path packages/codex-acp/Cargo.toml --target ${{ matrix.target }}

      - name: Create archive
        id: create_archive
        shell: bash
        run: |
          BINARY_NAME="acp-extension-codex${{ matrix.binary_extension }}"
          ARCHIVE_BASE="acp-extension-codex-${{ needs.get-version.outputs.version }}-${{ matrix.target }}"
          BIN_DIR="packages/codex-acp/target/${{ matrix.target }}/release"

          if [[ "${{ matrix.os }}" == windows-* ]]; then
            (cd "$BIN_DIR" && 7z a -tzip "$GITHUB_WORKSPACE/${ARCHIVE_BASE}.zip" "$BINARY_NAME")
            echo "archive_path=${ARCHIVE_BASE}.zip" >> "$GITHUB_OUTPUT"
            echo "archive_name=${ARCHIVE_BASE}.zip" >> "$GITHUB_OUTPUT"
          else
            tar -C "$BIN_DIR" -czf "${ARCHIVE_BASE}.tar.gz" "$BINARY_NAME"
            echo "archive_path=${ARCHIVE_BASE}.tar.gz" >> "$GITHUB_OUTPUT"
            echo "archive_name=${ARCHIVE_BASE}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create_archive.outputs.archive_name }}
          path: ${{ steps.create_archive.outputs.archive_path }}
          retention-days: 1

  npm-packages:
    name: Create NPM Packages
    needs: [get-version, build]
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.create_packages.outputs.packages }}

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: packages/codex-acp/artifacts
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -la packages/codex-acp/artifacts/

      - name: Create platform-specific packages
        working-directory: packages/codex-acp
        env:
          NPM_BASE_NAME: ${{ env.NPM_BASE_NAME }}
        run: bash npm/publish/create-platform-packages.sh ./artifacts ./npm-packages ${{ needs.get-version.outputs.version }}

      - name: Update base package version
        working-directory: packages/codex-acp
        env:
          NPM_BASE_NAME: ${{ env.NPM_BASE_NAME }}
        run: bash npm/publish/update-base-package.sh ${{ needs.get-version.outputs.version }}

      - name: Upload NPM packages
        uses: actions/upload-artifact@v4
        with:
          name: npm-packages
          path: packages/codex-acp/npm-packages/
          retention-days: 1

      - name: Upload base package
        uses: actions/upload-artifact@v4
        with:
          name: npm-base-package
          path: packages/codex-acp/npm/
          retention-days: 1

  publish-npm-platform:
    name: Publish NPM Platform Packages
    needs: [get-version, npm-packages]
    runs-on: ubuntu-latest
    if: ${{ !github.event.repository.fork }}
    environment: release # Optional: for enhanced security
    permissions:
      contents: read
      id-token: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
      - name: Update npm
        run: npm install -g npm@latest

      - name: Configure npm auth (token fallback)
        if: ${{ env.NPM_TOKEN != '' }}
        run: npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"

      - name: Download NPM packages
        uses: actions/download-artifact@v5
        with:
          name: npm-packages
          path: packages/codex-acp/npm-packages

      - name: Restore executable bits (unix binaries)
        working-directory: packages/codex-acp
        run: |
          # upload-artifact/download-artifact can drop Unix executable bits; restore before npm publish.
          find npm-packages -type f -path "*/bin/acp-extension-codex" -exec chmod 755 {} +

      - name: Publish platform packages
        working-directory: packages/codex-acp
        run: |
          if [ -n "${NPM_TOKEN:-}" ]; then
            publish_args=(--access public)
          else
            publish_args=(--provenance --access public)
          fi

          for pkg in npm-packages/*; do
            if [ -d "$pkg" ]; then
              echo "Publishing $(basename "$pkg")..."
              cd "$pkg"
              npm publish "${publish_args[@]}"
              cd ../..
            fi
          done

  publish-npm-base:
    name: Publish NPM Base Package
    needs: [get-version, npm-packages, publish-npm-platform]
    runs-on: ubuntu-latest
    if: ${{ !github.event.repository.fork }}
    environment: release # Optional: for enhanced security
    permissions:
      contents: read
      id-token: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
      - name: Update npm
        run: npm install -g npm@latest

      - name: Configure npm auth (token fallback)
        if: ${{ env.NPM_TOKEN != '' }}
        run: npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"

      - name: Download base package
        uses: actions/download-artifact@v5
        with:
          name: npm-base-package
          path: packages/codex-acp/npm

      - name: Wait for platform packages to be available
        run: |
          echo "Waiting 30 seconds for platform packages to be available on npm..."
          sleep 30

      - name: Publish base package
        working-directory: packages/codex-acp
        run: |
          cd npm
          if [ -n "${NPM_TOKEN:-}" ]; then
            npm publish --access public
          else
            npm publish --provenance --access public
          fi
